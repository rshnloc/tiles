# Used ONLY for first-time SSL certificate issuance via Certbot.
# After cert is obtained, switch to default.conf (which has HTTPS).

upstream frontend_upstream { server frontend:3000; }
upstream backend_upstream  { server backend:80; }

server {
    listen 80;
    server_name insurance.careerxera.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location /api/ {
        proxy_pass http://backend_upstream/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://frontend_upstream;
        proxy_set_header Host $host;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
    }
}
