upstream frontend_upstream {
    server frontend:3000;
    keepalive 32;
}

upstream backend_upstream {
    server backend:80;
    keepalive 16;
}

# ── HTTP → HTTPS redirect ─────────────────────────────────
server {
    listen 80;
    server_name insurance.careerxera.com;

    # Let's Encrypt ACME challenge (needed for cert issuance/renewal)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS ─────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name insurance.careerxera.com;

    # SSL — issued by Certbot (Let's Encrypt)
    ssl_certificate     /etc/letsencrypt/live/insurance.careerxera.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/insurance.careerxera.com/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/insurance.careerxera.com/chain.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_stapling        on;
    ssl_stapling_verify on;

    client_max_body_size 20M;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # ── API → PHP Backend ────────────────────────────────
    location /api/ {
        proxy_pass         http://backend_upstream/;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
    }

    # ── File storage (KYC docs, policy PDFs) ─────────────
    location /storage/ {
        proxy_pass         http://backend_upstream/storage/;
        proxy_set_header   X-Forwarded-Proto $scheme;
        expires            7d;
        add_header         Cache-Control "public, immutable";
    }

    # ── Next.js static assets (aggressive caching) ───────
    location /_next/static/ {
        proxy_pass         http://frontend_upstream;
        proxy_set_header   Host $host;
        expires            365d;
        add_header         Cache-Control "public, immutable";
    }

    # ── Next.js image optimisation ────────────────────────
    location /_next/image {
        proxy_pass         http://frontend_upstream;
        proxy_set_header   Host $host;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Next.js Frontend (all other routes) ──────────────
    location / {
        proxy_pass         http://frontend_upstream;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_http_version 1.1;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }
}
