version: '3.9'

services:
  # ── Next.js Frontend ─────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: https://insurance.careerxera.com/api
        NEXT_PUBLIC_APP_NAME: SunischistInsurance
    container_name: tiles_frontend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=https://insurance.careerxera.com/api
      - NEXT_PUBLIC_APP_NAME=SunischistInsurance
      - NEXT_PUBLIC_RAZORPAY_KEY=${NEXT_PUBLIC_RAZORPAY_KEY}
    depends_on:
      - backend
    networks:
      - tiles_net

  # ── PHP Backend ──────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tiles_backend
    restart: unless-stopped
    environment:
      - APP_ENV=production
      - APP_URL=https://insurance.careerxera.com
      - DB_HOST=mysql
      - DB_NAME=${DB_NAME:-tiles_insurance}
      - DB_USER=${DB_USER:-tiles_user}
      - DB_PASS=${DB_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
    volumes:
      - backend_storage:/var/www/html/storage
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - tiles_net

  # ── MySQL ─────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: tiles_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME:-tiles_insurance}
      MYSQL_USER: ${DB_USER:-tiles_user}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost', '-uroot', '-p${MYSQL_ROOT_PASSWORD}']
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 30s
    # ⚠️  Port NOT exposed in production (internal only)
    networks:
      - tiles_net

  # ── Nginx + SSL ───────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: tiles_nginx
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    depends_on:
      - frontend
      - backend
    networks:
      - tiles_net

  # ── Certbot auto-renewal ──────────────────────────────────
  certbot:
    image: certbot/certbot:latest
    container_name: tiles_certbot
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt
      - /var/www/certbot:/var/www/certbot
    entrypoint: /bin/sh -c "trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done"
    networks:
      - tiles_net

volumes:
  mysql_data:
    driver: local
  backend_storage:
    driver: local

networks:
  tiles_net:
    driver: bridge
